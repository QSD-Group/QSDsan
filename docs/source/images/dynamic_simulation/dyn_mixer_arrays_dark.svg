<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .heading  { font-size: 16px; font-weight: 600; fill: #ebebeb; }
    .body     { font-size: 13px; fill: #ebebeb; }
    .muted    { font-size: 12px; fill: #aaaaaa; }
    .mono     { font-family: 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace;
                font-size: 13px; fill: #ebebeb; }
    .eq       { font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
                font-size: 14px; fill: #ebebeb; }
    .c-label  { font-size: 13px; font-weight: 600; fill: #8ad07b; }
    .q-label  { font-size: 13px; font-weight: 600; fill: #e89cc8; }
  </style>

  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6fb1ff"/>
    </marker>
  </defs>

  <!-- y_ins matrix label -->
  <text class="heading" x="180" y="35" text-anchor="middle">y_ins  (shape: m × (n+1))</text>

  <!-- Column labels above matrix -->
  <text class="mono" x="90"  y="65" text-anchor="middle">C₁</text>
  <text class="mono" x="140" y="65" text-anchor="middle">C₂</text>
  <text class="mono" x="190" y="65" text-anchor="middle">C₃</text>
  <text class="mono" x="240" y="65" text-anchor="middle">C₄</text>
  <text class="mono" x="290" y="65" text-anchor="middle">Q</text>

  <!-- C_ins block -->
  <rect x="65" y="75" width="200" height="150"
        fill="#1f3b18" stroke="#8ad07b" stroke-width="1.3"/>
  <line x1="115" y1="75"  x2="115" y2="225" stroke="#8ad07b" stroke-width="0.5"/>
  <line x1="165" y1="75"  x2="165" y2="225" stroke="#8ad07b" stroke-width="0.5"/>
  <line x1="215" y1="75"  x2="215" y2="225" stroke="#8ad07b" stroke-width="0.5"/>
  <line x1="65"  y1="125" x2="265" y2="125" stroke="#8ad07b" stroke-width="0.5"/>
  <line x1="65"  y1="175" x2="265" y2="175" stroke="#8ad07b" stroke-width="0.5"/>

  <!-- Q_ins column -->
  <rect x="265" y="75" width="50" height="150"
        fill="#3b1d2e" stroke="#e89cc8" stroke-width="1.3"/>
  <line x1="265" y1="125" x2="315" y2="125" stroke="#e89cc8" stroke-width="0.5"/>
  <line x1="265" y1="175" x2="315" y2="175" stroke="#e89cc8" stroke-width="0.5"/>

  <!-- Row labels -->
  <text class="muted" x="60" y="104" text-anchor="end">inlet 1</text>
  <text class="muted" x="60" y="154" text-anchor="end">inlet 2</text>
  <text class="muted" x="60" y="204" text-anchor="end">inlet 3</text>

  <!-- Block labels below -->
  <text class="c-label" x="165" y="247" text-anchor="middle">C_ins  (m × n)</text>
  <text class="q-label" x="290" y="247" text-anchor="middle">Q_ins  (m,)</text>

  <!-- Right side: equations -->
  <text class="heading" x="380" y="85">Per integrator step, the AE computes:</text>

  <text class="eq"      x="380" y="118">Q_m  =  sum(Q_ins)</text>
  <text class="muted"   x="380" y="137">total volumetric flow through the mixer</text>

  <text class="eq"      x="380" y="173">C_m  =  Q_ins · C_ins  /  Q_m</text>
  <text class="muted"   x="380" y="192">flow-weighted concentration; an n-vector</text>

  <text class="eq"      x="380" y="228">_state[:-1] = C_m,   _state[-1] = Q_m</text>
  <text class="muted"   x="380" y="247">unit's own state array, length n+1</text>

  <!-- Outlet stream box -->
  <rect x="380" y="275" width="450" height="70"
        fill="#3b1d2e" stroke="#e89cc8" stroke-width="1.3" rx="6" ry="6"/>
  <text class="heading" x="392" y="298">_update_state writes to each outlet WasteStream:</text>
  <text class="mono"    x="392" y="321">ws.state[:-1] = _state[:-1]      # same C across all outs</text>
  <text class="mono"    x="392" y="340">ws.state[-1]  = _state[-1] / n_outs   # Q split equally</text>

  <!-- Arrow from equations to outlet box -->
  <line x1="480" y1="255" x2="480" y2="272"
        stroke="#6fb1ff" stroke-width="1.6" marker-end="url(#arr-blue)"/>
</svg>
