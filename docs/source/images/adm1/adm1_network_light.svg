<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .band-h    { fill: #f4ece3; stroke: #b08a5c; stroke-width: 1.2; }
    .band-ac   { fill: #e8f4ff; stroke: #2c6fb5; stroke-width: 1.2; }
    .band-acet { fill: #fdf2dc; stroke: #c98a1a; stroke-width: 1.2; }
    .band-meth { fill: #fbe6f0; stroke: #b04488; stroke-width: 1.2; }
    .pool      { fill: #ffffff; stroke: #555555; stroke-width: 1.2; }
    .pool-bio  { fill: #eaf6e6; stroke: #4a8d3a; stroke-width: 1.2; }
    .band-label { font-size: 14px; font-weight: 700; fill: #1a1a1a; letter-spacing: 0.5px; }
    .heading   { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .body      { font-size: 12px; fill: #1a1a1a; }
    .mono      { font-family: 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace;
                 font-size: 12px; fill: #1a1a1a; }
    .mono-sm   { font-family: 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace;
                 font-size: 11px; fill: #1a1a1a; }
    .muted     { font-size: 11px; fill: #555555; font-style: italic; }
    .step-label { font-size: 11px; fill: #555555; font-style: italic; }
    .biomass-tag { font-family: 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace;
                   font-size: 10px; fill: #2a6422; font-weight: 700; }
    .decay-label { font-size: 11px; fill: #4a8d3a; font-style: italic; font-weight: 600; }
  </style>

  <defs>
    <marker id="arr-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a8d3a"/>
    </marker>
  </defs>

  <!-- ============ Composites at top ============ -->
  <rect class="pool" x="310" y="15" width="100" height="32" rx="5" ry="5"/>
  <text class="mono" x="360" y="35" text-anchor="middle">X_c</text>
  <text class="muted" x="500" y="35">composites (feed + decay)</text>

  <line x1="360" y1="48" x2="360" y2="80" stroke="#555555" stroke-width="1.4" marker-end="url(#arr-dark)"/>
  <text class="step-label" x="350" y="58" text-anchor="end">disintegration</text>

  <!-- X_I side branch off the disintegration arrow: inert particulates pass through to the effluent -->
  <line x1="368" y1="70" x2="488" y2="70" stroke="#555555" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr-dark)"/>
  <text class="muted" x="495" y="74" text-anchor="start">X_I (inert) → effluent</text>

  <!-- ============ Row 1: HYDROLYSIS ============ -->
  <rect class="band-h" x="30" y="90" width="660" height="115" rx="8" ry="8"/>
  <text class="band-label" x="46" y="112">1. HYDROLYSIS</text>

  <rect class="pool" x="70"  y="135" width="80" height="28" rx="4" ry="4"/>
  <text class="mono" x="110" y="153" text-anchor="middle">X_ch</text>
  <line x1="152" y1="149" x2="208" y2="149" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <rect class="pool" x="210" y="135" width="80" height="28" rx="4" ry="4"/>
  <text class="mono" x="250" y="153" text-anchor="middle">S_su</text>
  <text class="muted" x="180" y="180" text-anchor="middle">carbohydrates → sugars</text>

  <rect class="pool" x="320" y="135" width="80" height="28" rx="4" ry="4"/>
  <text class="mono" x="360" y="153" text-anchor="middle">X_pr</text>
  <line x1="402" y1="149" x2="458" y2="149" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <rect class="pool" x="460" y="135" width="80" height="28" rx="4" ry="4"/>
  <text class="mono" x="500" y="153" text-anchor="middle">S_aa</text>
  <text class="muted" x="430" y="180" text-anchor="middle">proteins → amino acids</text>

  <rect class="pool" x="555" y="135" width="60" height="28" rx="4" ry="4"/>
  <text class="mono" x="585" y="153" text-anchor="middle">X_li</text>
  <line x1="617" y1="149" x2="643" y2="149" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <rect class="pool" x="645" y="135" width="40" height="28" rx="4" ry="4"/>
  <text class="mono-sm" x="665" y="153" text-anchor="middle">S_fa</text>
  <text class="muted" x="615" y="180" text-anchor="middle">lipids → LCFA</text>

  <line x1="360" y1="205" x2="360" y2="235" stroke="#555555" stroke-width="1.4" marker-end="url(#arr-dark)"/>

  <!-- ============ Row 2: ACIDOGENESIS ============ -->
  <rect class="band-ac" x="30" y="245" width="660" height="125" rx="8" ry="8"/>
  <text class="band-label" x="46" y="267">2. ACIDOGENESIS</text>

  <rect class="pool" x="70"  y="290" width="80" height="28" rx="4" ry="4"/>
  <text class="mono" x="110" y="308" text-anchor="middle">S_su</text>
  <line x1="152" y1="304" x2="248" y2="304" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="200" y="298" text-anchor="middle">X_su</text>
  <rect class="pool" x="250" y="290" width="300" height="28" rx="4" ry="4"/>
  <text class="mono-sm" x="400" y="308" text-anchor="middle">S_bu  +  S_pro  +  S_ac  +  S_h2</text>

  <rect class="pool" x="70"  y="328" width="80" height="28" rx="4" ry="4"/>
  <text class="mono" x="110" y="346" text-anchor="middle">S_aa</text>
  <line x1="152" y1="342" x2="248" y2="342" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="200" y="336" text-anchor="middle">X_aa</text>
  <rect class="pool" x="250" y="328" width="300" height="28" rx="4" ry="4"/>
  <text class="mono-sm" x="400" y="346" text-anchor="middle">S_va + S_bu + S_pro + S_ac + S_h2</text>

  <line x1="360" y1="370" x2="360" y2="400" stroke="#555555" stroke-width="1.4" marker-end="url(#arr-dark)"/>

  <!-- ============ Row 3: ACETOGENESIS (taller band, height 190) ============ -->
  <rect class="band-acet" x="30" y="410" width="660" height="190" rx="8" ry="8"/>
  <text class="band-label" x="46" y="432">3. ACETOGENESIS</text>

  <rect class="pool" x="70"  y="450" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="105" y="467" text-anchor="middle">S_fa</text>
  <line x1="142" y1="463" x2="248" y2="463" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="195" y="457" text-anchor="middle">X_fa</text>
  <rect class="pool" x="250" y="450" width="170" height="26" rx="4" ry="4"/>
  <text class="mono-sm" x="335" y="467" text-anchor="middle">S_ac  +  S_h2</text>

  <rect class="pool" x="70"  y="482" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="105" y="499" text-anchor="middle">S_va</text>
  <line x1="142" y1="495" x2="248" y2="495" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="195" y="489" text-anchor="middle">X_c4</text>
  <rect class="pool" x="250" y="482" width="240" height="26" rx="4" ry="4"/>
  <text class="mono-sm" x="370" y="499" text-anchor="middle">S_pro  +  S_ac  +  S_h2</text>

  <rect class="pool" x="70"  y="514" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="105" y="531" text-anchor="middle">S_bu</text>
  <line x1="142" y1="527" x2="248" y2="527" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="195" y="521" text-anchor="middle">X_c4</text>
  <rect class="pool" x="250" y="514" width="170" height="26" rx="4" ry="4"/>
  <text class="mono-sm" x="335" y="531" text-anchor="middle">S_ac  +  S_h2</text>

  <rect class="pool" x="70"  y="546" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="105" y="563" text-anchor="middle">S_pro</text>
  <line x1="142" y1="559" x2="248" y2="559" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="195" y="553" text-anchor="middle">X_pro</text>
  <rect class="pool" x="250" y="546" width="170" height="26" rx="4" ry="4"/>
  <text class="mono-sm" x="335" y="563" text-anchor="middle">S_ac  +  S_h2</text>

  <line x1="360" y1="600" x2="360" y2="630" stroke="#555555" stroke-width="1.4" marker-end="url(#arr-dark)"/>

  <!-- ============ Row 4: METHANOGENESIS ============ -->
  <rect class="band-meth" x="30" y="640" width="660" height="105" rx="8" ry="8"/>
  <text class="band-label" x="46" y="662">4. METHANOGENESIS</text>

  <rect class="pool" x="100" y="680" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="135" y="697" text-anchor="middle">S_ac</text>
  <line x1="172" y1="693" x2="268" y2="693" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="220" y="687" text-anchor="middle">X_ac</text>
  <rect class="pool" x="270" y="680" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="305" y="697" text-anchor="middle">S_ch4</text>
  <text class="muted" x="220" y="723" text-anchor="middle">acetoclastic</text>

  <rect class="pool" x="400" y="680" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="435" y="697" text-anchor="middle">S_h2</text>
  <line x1="472" y1="693" x2="568" y2="693" stroke="#555555" stroke-width="1.3" marker-end="url(#arr-dark)"/>
  <text class="biomass-tag" x="520" y="687" text-anchor="middle">X_h2</text>
  <rect class="pool" x="570" y="680" width="70" height="26" rx="4" ry="4"/>
  <text class="mono" x="605" y="697" text-anchor="middle">S_ch4</text>
  <text class="muted" x="520" y="723" text-anchor="middle">hydrogenotrophic</text>

  <line x1="360" y1="745" x2="360" y2="770" stroke="#555555" stroke-width="1.4" marker-end="url(#arr-dark)"/>
  <text class="step-label" x="370" y="763">gas-liquid transfer</text>

  <rect class="pool" x="240" y="775" width="240" height="30" rx="5" ry="5"/>
  <text class="heading" x="290" y="795" text-anchor="middle">Biogas:</text>
  <text class="mono" x="385" y="795" text-anchor="middle">S_h2,  S_ch4,  S_IC</text>

  <!-- Decay loop on right margin: all 7 biomass groups (X_su, X_aa, X_fa, X_c4, X_pro, X_ac, X_h2) return to X_c.
       Three short collector stubs come off each band that has biomass and feed into the vertical line at x=760. -->
  <line x1="560" y1="317" x2="757" y2="317" stroke="#4a8d3a" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text class="decay-label" x="565" y="313" text-anchor="start">X_su, X_aa</text>
  <line x1="500" y1="505" x2="757" y2="505" stroke="#4a8d3a" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text class="decay-label" x="505" y="501" text-anchor="start">X_fa, X_c4, X_pro</text>
  <line x1="650" y1="687" x2="757" y2="687" stroke="#4a8d3a" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text class="decay-label" x="655" y="683" text-anchor="start">X_ac, X_h2</text>

  <path d="M 760 687 L 760 50 L 415 50"
        fill="none" stroke="#4a8d3a" stroke-width="1.4" stroke-dasharray="5,3"
        marker-end="url(#arr-green)"/>
  <text class="decay-label" x="775" y="400" text-anchor="start">biomass decay</text>
  <text class="decay-label" x="775" y="416" text-anchor="start">(all X_* → X_c)</text>
</svg>
