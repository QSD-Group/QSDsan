# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    # You can also specify other tool versions:
    # nodejs: "16"
    # rust: "1.55"
    # golang: "1.17"
  jobs:
    post_build:
      # Rebuild the chatbot search index, but only on the dedicated 'chatbot'
      # version (where the widget is shown) and only when VOYAGE_API_KEY is set, so
      # other versions and PR previews never run it or fail for a missing key.
      - |
        if [ "$READTHEDOCS_VERSION" = "chatbot" ] && [ -n "$VOYAGE_API_KEY" ]; then
          pip install voyageai beautifulsoup4 &&
          python docs/chatbot/index_docs.py
        else
          echo "Skipping chatbot reindex (runs only on the chatbot version with VOYAGE_API_KEY set)."
        fi

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: docs/source/conf.py

# If using Sphinx, optionally build your docs in additional formats such as PDF
# formats:
#    - pdf

# Optionally declare the Python requirements required to build your docs
python:
   install:
   - method: pip
     path: .
     extra_requirements:
     - docs
