# This workflow will install Python dependencies, run tests with a variety of Python versions, and report coverage

name: build-only

on:
  push:
    branches: [beta, dev, trial]
  pull_request:
    branches: [beta, dev, trial]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest] if want multiple os
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir git+https://github.com/BioSTEAMDevelopmentGroup/thermosteam.git@master
        pip install --no-cache-dir git+https://github.com/BioSTEAMDevelopmentGroup/biosteam.git@master
        pip install --no-cache-dir -e ".[ci,integration]"
    - name: Test with pytest
      run: |
        pytest tests
