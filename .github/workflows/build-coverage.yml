# This workflow will install Python dependencies, run tests with a variety of Python versions, and report coverage

name: build-coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest] if want multiple os
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-coverage.yml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -c .github/requirements-release.txt -e ".[ci]"
    - name: Test and generate coverage report
      run: |
        mkdir -p tmps
        pytest -m "not integration" -n 2 --dist loadfile --basetemp=tmps/pytest-${{ github.run_id }}-${{ github.run_attempt }} --cov=./ --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      continue-on-error: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        directory: ./coverage/reports/
        env_vars: OS,PYTHON
        fail_ci_if_error: true
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        use_oidc: true
        verbose: true

  integration:
    # Non-blocking EXPOsan integration signal. Catches QSDsan -> EXPOsan breakage
    # on PRs (preview) and on push to main (post-merge canary). Does NOT gate
    # merges; mark only `build` as a required check in branch protection.
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-coverage.yml
    - name: Install dependencies with EXPOsan
      run: |
        python -m pip install --upgrade pip
        pip install -c .github/requirements-release.txt -e ".[ci]"
        pip install "exposan[complete] @ git+https://github.com/QSD-Group/EXPOsan.git"
    - name: Run integration tests and generate coverage report
      run: |
        mkdir -p tmps
        pytest -m integration -n 2 --dist loadfile --basetemp=tmps/pytest-int-${{ github.run_id }}-${{ github.run_attempt }} --cov=./ --cov-report=xml
    - name: Upload integration coverage to Codecov
      # Merged with the `build` job's report by Codecov (per-commit) so EXPOsan-
      # exercised qsdsan code still counts toward total coverage, without gating.
      uses: codecov/codecov-action@v7
      continue-on-error: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        directory: ./coverage/reports/
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        files: ./coverage.xml
        flags: integration
        name: codecov-integration
        use_oidc: true
        verbose: true

  retry-with-upstream-master:
    needs: build
    if: ${{ failure() }}
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-coverage.yml
    - name: Install dependencies with upstream BioSTEAM stack
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[ci]"
        pip install "exposan[complete] @ git+https://github.com/QSD-Group/EXPOsan.git"
        pip install --no-deps --force-reinstall git+https://github.com/BioSTEAMDevelopmentGroup/thermosteam.git@master
        pip install --no-deps --force-reinstall git+https://github.com/BioSTEAMDevelopmentGroup/biosteam.git@master
    - name: Test with pytest
      run: |
        pytest
