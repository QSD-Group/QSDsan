# Execute the tutorial notebooks end-to-end to catch breakage that the unit
# tests and the docs build miss. nbsphinx_execute defaults to 'auto', so
# tutorials that ship stored outputs are rendered WITHOUT being re-run; this
# workflow is what actually proves they still execute against the current stack.
#
# Runs --nbval-lax: every cell is executed and only UNEXPECTED exceptions fail
# the run (deliberate teaching errors are tagged `raises-exception`, which nbval
# honors). Output is not diffed, so version strings, diagrams, and plots do not
# cause false failures.
#
# Triggers (hybrid):
#   - weekly cron: catches upstream BioSTEAM/Thermosteam/EXPOsan drift that
#     breaks a tutorial with no QSDsan commit involved.
#   - workflow_dispatch: run on demand.
#   - push/PR: only when a tutorial or the docs config changes, so notebook-
#     affecting edits are caught at PR time without taxing unrelated PRs.

name: build-notebooks

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
  push:
    branches: [main, beta]
    paths:
      - 'docs/source/tutorials/**'
      - 'docs/source/conf.py'
      - '.github/workflows/build-notebooks.yml'
  pull_request:
    branches: [main, beta]
    paths:
      - 'docs/source/tutorials/**'
      - 'docs/source/conf.py'
      - '.github/workflows/build-notebooks.yml'

jobs:
  notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-notebooks.yml
    - name: Install graphviz
      # Tutorials call .diagram(), which shells out to graphviz `dot`.
      run: sudo apt-get update && sudo apt-get install -y graphviz
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -c .github/requirements-release.txt -e ".[ci]"
        pip install "exposan[complete] @ git+https://github.com/QSD-Group/EXPOsan.git"
    - name: Run tutorial notebooks
      # -o addopts="" drops the package-wide --doctest-modules so this job runs
      # only the notebooks. --current-env ignores each notebook's named kernelspec
      # and uses this environment's kernel (the named one does not exist on CI).
      env:
        MPLBACKEND: Agg
      run: |
        pytest --nbval-lax --current-env --nbval-cell-timeout=1800 \
          -o addopts="" docs/source/tutorials
