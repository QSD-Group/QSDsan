[pytest]
doctest_optionflags = 
	ELLIPSIS
	NUMBER
	NORMALIZE_WHITESPACE
	IGNORE_EXCEPTION_DETAIL
# Notebook execution lives in its own workflow (build-notebooks.yml,
# pytest --nbval-lax); keep it out of the default run so the fast test/doctest
# job is not slowed or coupled to heavy tutorial notebooks.
addopts =
	--doctest-modules
	--doctest-continue-on-failure
	--ignore='setup.py'
norecursedirs =
	build
	dist
	.egg-info
	.cache
	.git
	htmlcov
	notebooks
	tmp
	tmps
	docs
	docs/build
	docs/source/for_developers
	docs/source/tutorials/.ipynb_checkpoints
filterwarnings = ignore
markers =
    slow: Generally slow enough to exclude from fast test runs
    integration: Exercises external integration packages or full example systems
